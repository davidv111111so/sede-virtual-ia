<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sede Virtual - Spectrum & Paradise Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        background-color: #0f172a;
        color: #e2e8f0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #game-canvas {
        background-color: #1e293b;
        border-radius: 12px;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5);
        border-radius: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #475569;
        border-radius: 8px;
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .agent-card {
        transition: all 0.3s ease;
      }
      .agent-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        border-color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body
    class="flex flex-col md:flex-row h-screen p-4 gap-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black overflow-hidden"
  >
    <!-- Panel Izquierdo: El Mapa RPG -->
    <div class="flex flex-col gap-4 w-full md:w-7/12 h-full">
      <div
        class="flex justify-between items-center glass-panel p-5 rounded-2xl shadow-2xl shrink-0"
      >
        <div>
          <h1
            class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-tight"
          >
            AI Town Dashboard
          </h1>
          <p class="text-sm text-slate-400 mt-1">
            Real-time monitoring of agent activities & system health
          </p>
        </div>
        <div class="flex flex-col items-end gap-2">
          <span
            class="px-4 py-1.5 bg-emerald-500/10 text-emerald-400 rounded-full text-xs font-bold border border-emerald-500/20 flex items-center gap-2 uppercase tracking-wider shadow-[0_0_10px_rgba(16,185,129,0.2)]"
          >
            <span
              class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_5px_#10b981]"
            ></span>
            System Online
          </span>
          <span class="text-[10px] text-slate-500 font-mono"
            >HETZNER VPS - 65.108.151.207</span
          >
        </div>
      </div>

      <!-- Lienzo del Juego -->
      <div
        class="relative w-full rounded-2xl overflow-hidden glass-panel p-1 flex-grow"
      >
        <canvas id="game-canvas" class="w-full h-full rounded-xl"></canvas>

        <!-- Overlay Info -->
        <div
          class="absolute top-5 left-5 bg-slate-900/80 p-4 rounded-xl backdrop-blur-md border border-slate-700/50 text-xs shadow-xl pointer-events-none"
        >
          <p
            class="font-bold text-slate-300 mb-2 uppercase tracking-wider border-b border-slate-700 pb-2"
          >
            Active Zones
          </p>
          <div class="flex items-center gap-3 mb-1.5 text-slate-400">
            <div
              class="w-2.5 h-2.5 bg-blue-500 rounded shadow-[0_0_8px_#3b82f6]"
            ></div>
            Level Audio
          </div>
          <div class="flex items-center gap-3 mb-1.5 text-slate-400">
            <div
              class="w-2.5 h-2.5 bg-amber-500 rounded shadow-[0_0_8px_#f59e0b]"
            ></div>
            Paradise Rentals
          </div>
          <div class="flex items-center gap-3 mb-1.5 text-slate-400">
            <div
              class="w-2.5 h-2.5 bg-emerald-500 rounded shadow-[0_0_8px_#10b981]"
            ></div>
            BluePrint MI
          </div>
          <div class="flex items-center gap-3 mb-1.5 text-slate-400">
            <div
              class="w-2.5 h-2.5 bg-red-500 rounded shadow-[0_0_8px_#ef4444]"
            ></div>
            Marlon So Ag
          </div>
          <div class="flex items-center gap-3 text-slate-400">
            <div
              class="w-2.5 h-2.5 bg-purple-500 rounded shadow-[0_0_8px_#a855f7]"
            ></div>
            Hermes Core
          </div>
        </div>
      </div>
    </div>

    <!-- Panel Derecho: Data Cards Profesionales y Logs -->
    <div class="w-full md:w-5/12 flex flex-col gap-4 h-full">
      <!-- Estado de Agentes (Data Cards) con Scroll Fijo -->
      <div class="overflow-y-auto custom-scrollbar pr-2 h-[55%] shrink-0">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 pb-2" id="agent-list">
          <!-- Generado por JS -->
        </div>
      </div>

      <!-- Consola de Logs -->
      <div
        class="glass-panel p-4 rounded-2xl shadow-2xl flex flex-col flex-grow min-h-0"
      >
        <div
          class="flex justify-between items-center mb-3 border-b border-slate-700 pb-2 shrink-0"
        >
          <div class="flex items-center gap-2">
            <span
              class="text-xs font-bold text-slate-300 uppercase tracking-widest"
              >Live Terminal</span
            >
            <span
              class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"
            ></span>
          </div>
          <button
            onclick="clearLogs()"
            class="text-[10px] text-slate-400 hover:text-white uppercase tracking-wider transition-colors px-2 py-1 rounded bg-slate-800 hover:bg-slate-700"
          >
            Clear
          </button>
        </div>
        <div
          id="log-container"
          class="custom-scrollbar flex-grow overflow-y-auto font-mono text-[11px] leading-relaxed flex flex-col gap-1.5 pr-2"
        >
          <!-- Logs van aquí -->
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("game-canvas");
      const ctx = canvas.getContext("2d");
      let width, height;

      function resizeCanvas() {
        width = canvas.parentElement.clientWidth - 8;
        height = canvas.parentElement.clientHeight - 8;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener("resize", resizeCanvas);
      setTimeout(resizeCanvas, 100);

      const zones = {
        spectrum: {
          color: "rgba(59, 130, 246, 0.08)",
          borderColor: "rgba(59, 130, 246, 0.4)",
          label: "Level Audio",
        },
        paradise: {
          color: "rgba(245, 158, 11, 0.08)",
          borderColor: "rgba(245, 158, 11, 0.4)",
          label: "Paradise Rentals",
        },
        blueprint: {
          color: "rgba(16, 185, 129, 0.08)",
          borderColor: "rgba(16, 185, 129, 0.4)",
          label: "BluePrint MI",
        },
        car_scrap: {
          color: "rgba(239, 68, 68, 0.08)",
          borderColor: "rgba(239, 68, 68, 0.4)",
          label: "Marlon So Ag",
        },
        servers: {
          color: "rgba(168, 85, 247, 0.08)",
          borderColor: "rgba(168, 85, 247, 0.4)",
          label: "Hermes Core",
        },
      };

      const agents = [
        {
          id: "hermes",
          name: "Hermes my bro",
          role: "General purpose orchestrator",
          color: "#a855f7",
          tailwindColor: "text-purple-400",
          emoji: "🤖",
          x: 0,
          y: 0,
          tx: 0,
          ty: 0,
          speed: 1.5,
          task: "Routing messages...",
          status: "idle",
          stats: {
            v1: "98%",
            l1: "Uptime",
            v2: "42",
            l2: "Messages/hr",
            v3: "12ms",
            l3: "Latency",
          },
        },
        {
          id: "spectrum_dev",
          name: "Level Audio",
          role: "Spectrum audio app",
          color: "#3b82f6",
          tailwindColor: "text-blue-400",
          emoji: "🎧",
          x: 0,
          y: 0,
          tx: 0,
          ty: 0,
          speed: 2,
          task: "Processing audio...",
          status: "coding",
          stats: {
            v1: "100%",
            l1: "Uptime",
            v2: "156",
            l2: "Tasks/hr",
            v3: "0",
            l3: "Errors",
          },
        },
        {
          id: "paradise_ops",
          name: "Paradise Premium",
          role: "Furnished properties & boats",
          color: "#f59e0b",
          tailwindColor: "text-amber-400",
          emoji: "🛥️",
          x: 0,
          y: 0,
          tx: 0,
          ty: 0,
          speed: 1.2,
          task: "Updating DB...",
          status: "searching",
          stats: {
            v1: "94%",
            l1: "Uptime",
            v2: "77",
            l2: "Requests/hr",
            v3: "2",
            l3: "Pending",
          },
        },
        {
          id: "blueprint_ops",
          name: "BluePrint MI",
          role: "USA Home restoration & remodel",
          color: "#10b981",
          tailwindColor: "text-emerald-400",
          emoji: "🏠",
          x: 0,
          y: 0,
          tx: 0,
          ty: 0,
          speed: 1.3,
          task: "Rendering 3D...",
          status: "designing",
          stats: {
            v1: "99%",
            l1: "Uptime",
            v2: "14",
            l2: "Quotes/day",
            v3: "1",
            l3: "Active Site",
          },
        },
        {
          id: "scrap_bot",
          name: "Marlon So Ag",
          role: "Car scrapping & selling",
          color: "#ef4444",
          tailwindColor: "text-red-400",
          emoji: "🚗",
          x: 0,
          y: 0,
          tx: 0,
          ty: 0,
          speed: 2.5,
          task: "Scraping Cars...",
          status: "scraping",
          stats: {
            v1: "92%",
            l1: "Uptime",
            v2: "850",
            l2: "Rows/hr",
            v3: "5",
            l3: "Alerts",
          },
        },
      ];

      agents.forEach((a) => {
        a.x = Math.random() * (width || 500);
        a.y = Math.random() * (height || 500);
        setNewTarget(a);
      });

      function setNewTarget(agent) {
        if (!width || !height) return;
        let targetZone = null;
        if (agent.id === "spectrum_dev")
          targetZone = {
            x: width * 0.7,
            y: height * 0.1,
            w: width * 0.25,
            h: height * 0.3,
          };
        else if (agent.id === "paradise_ops")
          targetZone = {
            x: width * 0.05,
            y: height * 0.1,
            w: width * 0.3,
            h: height * 0.3,
          };
        else if (agent.id === "blueprint_ops")
          targetZone = {
            x: width * 0.05,
            y: height * 0.6,
            w: width * 0.3,
            h: height * 0.3,
          };
        else if (agent.id === "scrap_bot")
          targetZone = {
            x: width * 0.6,
            y: height * 0.6,
            w: width * 0.3,
            h: height * 0.3,
          };
        else
          targetZone = {
            x: width * 0.4,
            y: height * 0.4,
            w: width * 0.2,
            h: height * 0.2,
          };

        if (Math.random() > 0.3) {
          agent.tx = targetZone.x + Math.random() * targetZone.w;
          agent.ty = targetZone.y + Math.random() * targetZone.h;
        } else {
          agent.tx = Math.random() * (width - 40) + 20;
          agent.ty = Math.random() * (height - 40) + 20;
        }
      }

      function gameLoop() {
        if (!width || !height) {
          requestAnimationFrame(gameLoop);
          return;
        }

        ctx.clearRect(0, 0, width, height);

        ctx.strokeStyle = "rgba(255,255,255,0.02)";
        ctx.lineWidth = 1;
        for (let i = 0; i < width; i += 50) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, height);
          ctx.stroke();
        }
        for (let i = 0; i < height; i += 50) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(width, i);
          ctx.stroke();
        }

        drawZone(
          width * 0.7,
          height * 0.1,
          width * 0.25,
          height * 0.3,
          zones.spectrum,
        );
        drawZone(
          width * 0.05,
          height * 0.1,
          width * 0.3,
          height * 0.3,
          zones.paradise,
        );
        drawZone(
          width * 0.05,
          height * 0.6,
          width * 0.3,
          height * 0.3,
          zones.blueprint,
        );
        drawZone(
          width * 0.6,
          height * 0.6,
          width * 0.3,
          height * 0.3,
          zones.car_scrap,
        );
        drawZone(
          width * 0.4,
          height * 0.4,
          width * 0.2,
          height * 0.2,
          zones.servers,
        );

        agents.forEach((agent) => {
          const dx = agent.tx - agent.x;
          const dy = agent.ty - agent.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist > 5) {
            agent.x += (dx / dist) * agent.speed;
            agent.y += (dy / dist) * agent.speed;
          } else {
            if (Math.random() < 0.02) setNewTarget(agent);
          }

          const gradient = ctx.createRadialGradient(
            agent.x,
            agent.y,
            0,
            agent.x,
            agent.y,
            25,
          );
          gradient.addColorStop(0, agent.color + "80");
          gradient.addColorStop(1, "transparent");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(agent.x, agent.y, 25, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#1e293b";
          ctx.beginPath();
          ctx.arc(agent.x, agent.y, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = agent.color;
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.font = "16px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(agent.emoji, agent.x, agent.y);

          ctx.fillStyle = "white";
          ctx.font = "bold 10px Tahoma";
          ctx.fillText(agent.name, agent.x, agent.y - 24);

          ctx.fillStyle = "rgba(255,255,255,0.5)";
          ctx.font = "9px Tahoma";
          ctx.fillText(agent.task, agent.x, agent.y + 24);
        });
        requestAnimationFrame(gameLoop);
      }

      function drawZone(x, y, w, h, zoneConf) {
        ctx.fillStyle = zoneConf.color;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 8);
        ctx.fill();
        ctx.strokeStyle = zoneConf.borderColor;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = zoneConf.borderColor.replace("0.4", "0.8");
        ctx.font = "bold 10px Tahoma";
        ctx.textAlign = "left";
        ctx.fillText(zoneConf.label.toUpperCase(), x + 8, y + 18);
      }

      const logContainer = document.getElementById("log-container");
      const agentList = document.getElementById("agent-list");

      function updateUI() {
        agentList.innerHTML = "";
        agents.forEach((a) => {
          const card = document.createElement("div");
          card.className = `agent-card glass-panel p-4 rounded-xl flex flex-col justify-between border-t-2`;
          card.style.borderTopColor = a.color;
          card.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-xl shadow-inner border border-slate-700 shrink-0">${a.emoji}</div>
                        <div class="min-w-0">
                            <div class="font-bold text-sm ${a.tailwindColor} truncate">${a.name}</div>
                            <div class="text-[10px] text-slate-400 leading-tight truncate">${a.role}</div>
                        </div>
                    </div>
                    
                    <div class="bg-slate-900/50 rounded-lg p-2 mb-3 shadow-inner">
                        <div class="text-[9px] text-slate-500 uppercase font-bold mb-1">Current Task</div>
                        <div class="text-[11px] text-slate-300 truncate font-mono">${a.task}</div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 text-center pt-2 border-t border-slate-700/50">
                        <div>
                            <div class="text-sm font-bold ${a.tailwindColor}">${a.stats.v1}</div>
                            <div class="text-[9px] text-slate-500">${a.stats.l1}</div>
                        </div>
                        <div>
                            <div class="text-sm font-bold ${a.tailwindColor}">${a.stats.v2}</div>
                            <div class="text-[9px] text-slate-500">${a.stats.l2}</div>
                        </div>
                        <div>
                            <div class="text-sm font-bold ${a.tailwindColor}">${a.stats.v3}</div>
                            <div class="text-[9px] text-slate-500">${a.stats.l3}</div>
                        </div>
                    </div>
                `;
          agentList.appendChild(card);
        });
      }

      function addLog(agent, action) {
        const time = new Date().toLocaleTimeString("es-CO", { hour12: false });
        const logEl = document.createElement("div");
        logEl.className =
          "flex gap-2 items-start py-1.5 border-b border-slate-800/50 hover:bg-slate-800/30 px-2 rounded transition-colors";
        logEl.innerHTML = `
                <span class="text-slate-600 shrink-0 text-[10px]">[${time}]</span>
                <span style="color: ${agent.color}" class="font-bold shrink-0 w-20 truncate">${agent.name}:</span>
                <span class="text-slate-300 break-words flex-grow">${action}</span>
            `;
        logContainer.appendChild(logEl);
        logContainer.scrollTop = logContainer.scrollHeight;
        agent.task = action.substring(0, 20) + "...";

        if (Math.random() > 0.7)
          agent.stats.v2 = (parseInt(agent.stats.v2) + 1).toString();
        updateUI();
      }

      function clearLogs() {
        logContainer.innerHTML = "";
      }

      const mockActions = {
        spectrum_dev: [
          "Optimizando DSP de Level Audio...",
          "Configurando ecualizador",
          "Procesando pistas de audio...",
          "Revisando CPU de streaming",
        ],
        paradise_ops: [
          "Actualizando disponibilidad de botes",
          "Scrapeando rentas amobladas",
          "Enviando cotización de yate",
          "Calculando ROI de propiedad",
        ],
        blueprint_ops: [
          "Diseñando modelo 3D en USA",
          "Cotizando materiales",
          "Renderizando fachada",
          "Agendando contratista",
        ],
        scrap_bot: [
          "Extrayendo autos para scrapping",
          "Alerta: Oportunidad de marketing",
          "Campaña de ventas activa",
          "Filtrando leads de vehículos",
        ],
        hermes: [
          "Ruteando mensaje a BluePrint",
          "Consultando memoria general",
          "Orquestando agentes",
          "Ping a agentes: 12ms",
        ],
      };

      setInterval(() => {
        const randomAgent = agents[Math.floor(Math.random() * agents.length)];
        const actions = mockActions[randomAgent.id];
        const randomAction =
          actions[Math.floor(Math.random() * actions.length)];
        addLog(randomAgent, randomAction);
      }, 3000);

      setTimeout(() => {
        updateUI();
        addLog(agents[0], "Sistema Hermes V3 conectado y monitoreando.");
        requestAnimationFrame(gameLoop);
      }, 500);
    </script>
  </body>
</html>
